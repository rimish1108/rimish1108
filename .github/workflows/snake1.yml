name: Generate Snake
on:
  schedule:
    - cron: "0 */6***"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snak@v3
       with:
         github_user_name: rimish1108
         outputs:
           dist/github-snake-dark.svg?platte=github-dark
    -uses: crazy-max/ghaction-github-pages@v3
     with:
       target_branch: output
       build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
